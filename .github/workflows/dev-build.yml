name: Flutter Dev Branch CI Build

on:
  push:
    branches:
      - Dev
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'Dev'
        type: choice
        options:
          - Dev
          - main
          - Beta

permissions:
  contents: read

jobs:
  build_env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Generate Version Number
        id: generate_version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_HASH=$(git rev-parse --short HEAD)
          BUILD_VERSION="${COMMIT_COUNT}.dev+${SHORT_HASH}"
          echo "BUILD_VERSION=${BUILD_VERSION}" >> $GITHUB_OUTPUT
          echo "Generated BUILD_VERSION: ${BUILD_VERSION}"
        shell: bash

      - name: Update version in pubspec.yaml
        id: update_version_in_pubspec
        run: |
          MAIN_VERSION=$(grep "^version:" pubspec.yaml | sed -E 's/version: ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "MAIN_VERSION=${MAIN_VERSION}"
          FULL_VERSION="${MAIN_VERSION}+${{ steps.generate_version.outputs.BUILD_VERSION }}"
          echo "FULL_VERSION=${FULL_VERSION}"
          sed -i "s/^version: .*/version: ${FULL_VERSION}/" pubspec.yaml
          cat pubspec.yaml
          if grep -q "^version: ${FULL_VERSION}" pubspec.yaml; then
            echo "Version updated successfully to ${FULL_VERSION}"
          else
            echo "Failed to update version"
            grep "^version:" pubspec.yaml
            exit 1
          fi
          echo "FULL_VERSION=${FULL_VERSION}" > _build_env.config
        shell: bash

      - name: Upload build env files
        uses: actions/upload-artifact@v4
        with:
          name: build_env_files
          path: |
            pubspec.yaml
            _build_env.config

  build_app:
    needs: build_env
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: android
            os: ubuntu-latest
          - name: android-aab
            os: ubuntu-latest
          - name: linux
            os: ubuntu-latest
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Download build env files
        uses: actions/download-artifact@v4
        with:
          name: build_env_files

      - name: Read FULL_VERSION from _build_env.config
        id: read_build_env
        run: |
          FULL_VERSION=$(grep 'FULL_VERSION=' _build_env.config | cut -d '=' -f2)
          echo "FULL_VERSION=${FULL_VERSION}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Check Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Create Keystore and Properties file
        if: matrix.name == 'android' || matrix.name == 'android-aab'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          PROPS_STORE_PASS: ${{ secrets.ANDROID_STORE_PASSWORD }}
          PROPS_KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PROPS_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          printf "storePassword=%s\n" "$PROPS_STORE_PASS" > android/key.properties
          printf "keyPassword=%s\n" "$PROPS_KEY_PASS" >> android/key.properties
          printf "keyAlias=%s\n" "$PROPS_KEY_ALIAS" >> android/key.properties
          printf "storeFile=upload-keystore.jks\n" >> android/key.properties
        shell: bash

      - name: Build Android APK
        if: matrix.name == 'android'
        run: |
          flutter build apk
          flutter build apk --split-per-abi

      - name: Build Android App Bundle
        if: matrix.name == 'android-aab'
        run: flutter build appbundle

      - name: Build Linux
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libasound2-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-good1.0-dev libsecret-1-dev
          flutter build linux

      - name: Build Windows
        if: matrix.name == 'windows'
        run: flutter build windows

      - name: Build macOS
        if: matrix.name == 'macos'
        run: flutter build macos

      - name: Compress Build
        run: |
          FULL_VER="${{ steps.read_build_env.outputs.FULL_VERSION }}"
          if [ "${{ matrix.name }}" = "android" ]; then
            mv build/app/outputs/flutter-apk/app-release.apk ./app-dev-all-${FULL_VER}.apk
            mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk ./app-dev-armeabi-v7a-${FULL_VER}.apk
            mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk ./app-dev-arm64-v8a-${FULL_VER}.apk
            mv build/app/outputs/flutter-apk/app-x86_64-release.apk ./app-dev-x86_64-${FULL_VER}.apk
          elif [ "${{ matrix.name }}" = "android-aab" ]; then
            mv build/app/outputs/bundle/release/app-release.aab ./app-dev-${FULL_VER}.aab
          elif [ "${{ matrix.name }}" = "linux" ]; then
            zip -r linux-dev-${FULL_VER}.zip build/linux/x64/release/bundle
          elif [ "${{ matrix.name }}" = "windows" ]; then
            powershell Compress-Archive build/windows/x64/runner/Release windows-dev-${FULL_VER}.zip
          elif [ "${{ matrix.name }}" = "macos" ]; then
            zip -r macos-dev-${FULL_VER}.zip build/macos/Build/Products/Release
          fi
        shell: bash

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-dev-artifact
          path: |
            *.apk
            *.aab
            *.zip
          if-no-files-found: error
